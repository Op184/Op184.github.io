              <p>见过雪山与雄鹰<br>
见过翻滚的经幡<br>
见过远方。</p>
<p>飞鸟寻找西藏<br>
火炬寻找夜晚<br>
梦境寻找失眠者<br>
人间有一半看客。</p>
<p>台前灯光斑驳<br>
皮影含混是非<br>
听得世间痴情男女<br>
听不懂劫渡。</p>
<p>孤独或者依恋<br>
夜晚明亮如同翅膀<br>
湖水清澈 盛满倒影</p>
<p>它本人如西藏般孤独。</p>
<p><em>2021.03.09</em></p>
